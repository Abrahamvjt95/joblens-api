AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: JobLens — Serverless job search pipeline with OpenSearch

Globals:
  Function:
    Runtime: python3.11
    Timeout: 60
    MemorySize: 256
    CodeUri: lambdas/
    Environment:
      Variables:
        OPENSEARCH_HOST:      !Ref OpenSearchHost
        OPENSEARCH_PORT:      "443"
        OPENSEARCH_USE_SSL:   "true"
        OPENSEARCH_USER:      !Ref OpenSearchUser
        OPENSEARCH_PASSWORD:  !Ref OpenSearchPassword
        OPENSEARCH_INDEX:     "job-listings"
        S3_BUCKET_RAW:        !Sub "joblens-raw-${AWS::AccountId}"
        S3_BUCKET_NORMALIZED: !Sub "joblens-normalized-${AWS::AccountId}"

Parameters:
  OpenSearchHost:
    Type: String
  OpenSearchUser:
    Type: String
    Default: admin
  OpenSearchPassword:
    Type: String
    NoEcho: true
  AdzunaAppId:
    Type: String
    NoEcho: true
  AdzunaAppKey:
    Type: String
    NoEcho: true

Resources:
  # ── S3 Buckets ────────────────────────────────────────────────────────────
  RawBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "joblens-raw-${AWS::AccountId}"
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldRawFiles
            Status: Enabled
            ExpirationInDays: 14

  NormalizedBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "joblens-normalized-${AWS::AccountId}"
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldNormalizedFiles
            Status: Enabled
            ExpirationInDays: 30

  # ── Orchestrator ─────────────────────────────────────────────────────────
  OrchestratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: joblens-orchestrator
      Handler: orchestrator.handler.handler
      Timeout: 30
      Environment:
        Variables:
          LAMBDA_FETCHER_ADZUNA:    joblens-fetcher-adzuna
          LAMBDA_FETCHER_THEMUSE:   joblens-fetcher-themuse
          LAMBDA_FETCHER_REMOTIVE:  joblens-fetcher-remotive
          LAMBDA_FETCHER_ARBEITNOW: joblens-fetcher-arbeitnow
          LAMBDA_FETCHER_HIMALAYAS: joblens-fetcher-himalayas
          LAMBDA_FETCHER_JOBICY:    joblens-fetcher-jobicy
      Policies:
        - LambdaInvokePolicy:
            FunctionName: "*"

  # ── Fetchers ─────────────────────────────────────────────────────────────
  FetcherAdzunaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: joblens-fetcher-adzuna
      Handler: fetchers.handler.handler
      Timeout: 120
      Environment:
        Variables:
          FETCHER_SOURCE:   adzuna
          ADZUNA_APP_ID:    !Ref AdzunaAppId
          ADZUNA_APP_KEY:   !Ref AdzunaAppKey
          ADZUNA_COUNTRIES: gb,pt,de,es,fr
      Policies:
        - S3WritePolicy:
            BucketName: !Ref RawBucket

  FetcherTheMuseFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: joblens-fetcher-themuse
      Handler: fetchers.handler.handler
      Timeout: 60
      Environment:
        Variables:
          FETCHER_SOURCE: themuse
      Policies:
        - S3WritePolicy:
            BucketName: !Ref RawBucket

  FetcherRemotiveFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: joblens-fetcher-remotive
      Handler: fetchers.handler.handler
      Timeout: 60
      Environment:
        Variables:
          FETCHER_SOURCE: remotive
      Policies:
        - S3WritePolicy:
            BucketName: !Ref RawBucket

  FetcherArbeitnowFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: joblens-fetcher-arbeitnow
      Handler: fetchers.handler.handler
      Timeout: 60
      Environment:
        Variables:
          FETCHER_SOURCE: arbeitnow
      Policies:
        - S3WritePolicy:
            BucketName: !Ref RawBucket

  FetcherHimalayasFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: joblens-fetcher-himalayas
      Handler: fetchers.handler.handler
      Timeout: 120
      Environment:
        Variables:
          FETCHER_SOURCE: himalayas
      Policies:
        - S3WritePolicy:
            BucketName: !Ref RawBucket

  FetcherJobicyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: joblens-fetcher-jobicy
      Handler: fetchers.handler.handler
      Timeout: 60
      Environment:
        Variables:
          FETCHER_SOURCE: jobicy
      Policies:
        - S3WritePolicy:
            BucketName: !Ref RawBucket

  # ── Normalizer ────────────────────────────────────────────────────────────
  NormalizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: joblens-normalizer
      Handler: normalizer.handler.handler
      Timeout: 120
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref RawBucket
        - S3WritePolicy:
            BucketName: !Ref NormalizedBucket

  # ── Indexer ───────────────────────────────────────────────────────────────
  IndexerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: joblens-indexer
      Handler: indexer.handler.handler
      Timeout: 120
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref NormalizedBucket

  # ── Cleanup ───────────────────────────────────────────────────────────────
  CleanupFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: joblens-cleanup
      Handler: cleanup.handler.handler
      Timeout: 60
      Environment:
        Variables:
          JOBS_TTL_DAYS: "30"
      Events:
        DailyCleanup:
          Type: Schedule
          Properties:
            Schedule: cron(30 7 * * ? *)
            Description: "Delete OpenSearch jobs older than 30 days"

  # ── API Gateway + Search Lambdas ─────────────────────────────────────────
  JobsApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: joblens-api
      StageName: v1
      Cors:
        AllowMethods: "'GET,OPTIONS'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin: "'*'"

  SearchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: joblens-search
      Handler: search.handler.handler
      Events:
        SearchApi:
          Type: Api
          Properties:
            RestApiId: !Ref JobsApi
            Path: /jobs/search
            Method: GET

  AutocompleteFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: joblens-autocomplete
      Handler: autocomplete.handler.handler
      Events:
        AutocompleteApi:
          Type: Api
          Properties:
            RestApiId: !Ref JobsApi
            Path: /jobs/autocomplete
            Method: GET

  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: joblens-health
      Handler: health.handler.handler
      Events:
        HealthApi:
          Type: Api
          Properties:
            RestApiId: !Ref JobsApi
            Path: /health
            Method: GET

Outputs:
  ApiEndpoint:
    Description: API Gateway base URL
    Value: !Sub "https://${JobsApi}.execute-api.${AWS::Region}.amazonaws.com/v1"
  RawBucketName:
    Value: !Ref RawBucket
  NormalizedBucketName:
    Value: !Ref NormalizedBucket
